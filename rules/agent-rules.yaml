rules:
  - name: "Never commit secrets"
    check: "grep -rEI '(api[_-]?key|secret|password)' ."
    action: "block"
    message: "Your changes appear to contain hardcoded secrets. Commit blocked."

  - name: "Require human approval for git commits"
    trigger: "git commit"
    action: "approval"
    message: "A commit requires human approval."

  - name: "Require human approval for git push"
    trigger: "git push"
    action: "approval"
    message: "A push requires human approval."

  - name: "Require human approval for destructive commands (rm, deploy)"
    trigger: "(rm|deploy)"
    action: "approval"
    message: "Destructive operations require explicit human confirmation."
